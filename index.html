<!DOCTYPE html>
<html>
<head>
  <title>Mobile Share Pro+</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="loader">⚡ Loading...</div>

<div class="card" id="app" style="display:none;">

<h1 class="title">📡 MOBILE SHARE PRO</h1>

<input type="file" id="fileInput">

<div class="btn-group">
  <button id="receiveBtn" onclick="startScanner()">RECEIVE</button>
  <button id="sendBtn" onclick="uploadFile()">SEND</button>
</div>

<div class="progress">
  <div class="progress-bar" id="progressBar"></div>
</div>

<div id="qrcode"></div>

<div id="reader"></div>

</div>

<audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<script src="script.js"></script>

</body>
</html>
