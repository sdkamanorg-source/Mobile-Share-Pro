<!DOCTYPE html>
<html>
<head>
  <title>Mobile Share Pro+</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="loader">⚡ Loading...</div>

<div class="card" id="app">

<h2>🚀 MOBILE SHARE PRO+</h2>

<input type="file" id="fileInput">
<button onclick="uploadFile()">SEND</button>

<div class="progress">
  <div class="progress-bar" id="progressBar"></div>
</div>

<div id="qrcode"></div>

<hr>

<button onclick="startScanner()">SCAN</button>
<div id="reader"></div>

</div>

<audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<script type="module" src="script.js"></script>

</body>
</html>
